<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineMatch</title>
  <style>
    :root{
      --bg:#0f1115;
      --card:#181c23;
      --card2:#202631;
      --text:#f5f7fa;
      --muted:#aab3c2;
      --accent:#7c5cff;
      --accent2:#18c37e;
      --danger:#ff5d73;
      --border:#2c3442;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:linear-gradient(180deg,#0d1015,#141922);
      color:var(--text);
      min-height:100vh;
      padding:24px;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
    }

    h1{
      font-size:2rem;
      margin-bottom:8px;
    }

    .subtitle{
      color:var(--muted);
      margin-bottom:24px;
    }

    .grid{
      display:grid;
      grid-template-columns:1.1fr 0.9fr;
      gap:20px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .card h2{
      margin-bottom:14px;
      font-size:1.2rem;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:12px;
    }

    .full{
      margin-bottom:12px;
    }

    label{
      display:block;
      font-size:0.95rem;
      color:var(--muted);
      margin-bottom:6px;
    }

    input, select{
      width:100%;
      background:var(--card2);
      color:var(--text);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      outline:none;
    }

    button{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-weight:700;
      cursor:pointer;
      transition:0.2s ease;
    }

    button:hover{
      transform:translateY(-1px);
      opacity:0.95;
    }

    .btn-primary{
      background:var(--accent);
      color:white;
    }

    .btn-secondary{
      background:var(--accent2);
      color:#07140d;
    }

    .btn-danger{
      background:var(--danger);
      color:white;
    }

    .button-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
    }

    .list{
      margin-top:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .item{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .item-info{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .item-title{
      font-weight:700;
    }

    .item-meta{
      color:var(--muted);
      font-size:0.92rem;
    }

    .item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .small-btn{
      padding:8px 10px;
      font-size:0.88rem;
    }

    .result-box{
      margin-top:14px;
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:16px;
      min-height:120px;
      line-height:1.6;
    }

    .hint{
      color:var(--muted);
      font-size:0.92rem;
      margin-top:10px;
    }

    .section-space{
      margin-top:20px;
    }

    @media (max-width: 900px){
      .grid{
        grid-template-columns:1fr;
      }

      .row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CineMatch</h1>
    <p class="subtitle">Salva film e serie, segna quelli visti e ricevi consigli personalizzati in base ai tuoi gusti.</p>

    <div class="grid">
      <div class="card">
        <h2>Aggiungi un titolo</h2>

        <div class="full">
          <label for="title">Titolo</label>
          <input id="title" type="text" placeholder="Es. Alien" />
        </div>

        <div class="row">
          <div>
            <label for="typeInput">Tipo</label>
            <select id="typeInput">
              <option value="film">Film</option>
              <option value="serie">Serie</option>
            </select>
          </div>

          <div>
            <label for="runtime">Durata</label>
            <input id="runtime" type="number" placeholder="Es. 117" />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="genres">Generi</label>
            <input id="genres" type="text" placeholder="Es. horror, sci-fi, thriller" />
          </div>

          <div>
            <label for="moods">Mood</label>
            <input id="moods" type="text" placeholder="Es. dark, teso, psicologico" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn-primary" onclick="addToWatchlist()">Aggiungi alla watchlist</button>
          <button class="btn-secondary" onclick="markDirectlyWatched()">Segna subito come visto</button>
        </div>

        <p class="hint">Scrivi generi e mood separati da virgole, così i consigli saranno più intelligenti.</p>

        <div class="section-space">
          <h2>Watchlist</h2>
          <div id="watchlist" class="list"></div>
        </div>
      </div>

      <div class="card">
        <h2>Consigli personalizzati</h2>

        <div class="row">
          <div>
            <label for="duration">Durata</label>
            <select id="duration">
              <option value="qualsiasi">Qualsiasi</option>
              <option value="breve">Breve</option>
              <option value="90 minuti">90 minuti</option>
              <option value="1 ora e mezza">1 ora e mezza</option>
              <option value="circa 2 ore">Circa 2 ore</option>
              <option value="lungo">Lungo</option>
            </select>
          </div>

          <div>
            <label for="mood">Mood</label>
            <select id="mood">
              <option value="qualsiasi">Qualsiasi</option>
              <option value="dark">Dark</option>
              <option value="teso">Teso</option>
              <option value="psicologico">Psicologico</option>
              <option value="horror">Horror</option>
              <option value="thriller">Thriller</option>
              <option value="sci-fi">Sci-fi</option>
              <option value="strano">Strano</option>
              <option value="adrenalinico">Adrenalinico</option>
              <option value="riflessivo">Riflessivo</option>
            </select>
          </div>
        </div>

        <div class="full">
          <label for="type">Tipo</label>
          <select id="type">
            <option value="film o serie">Film o serie</option>
            <option value="film">Film</option>
            <option value="serie">Serie</option>
          </select>
        </div>

        <div class="button-row">
          <button class="btn-primary" onclick="recommendTitle()">Trova consigli</button>
        </div>

        <div id="recommendation" class="result-box">
          Qui compariranno i tuoi 5 consigli migliori.
        </div>

        <div class="section-space">
          <h2>Visti</h2>
          <div id="watchedList" class="list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="recommend.js"></script>

  <script>
    function readStorageArray(key) {
      try {
        const data = JSON.parse(localStorage.getItem(key));
        return Array.isArray(data) ? data : [];
      } catch {
        return [];
      }
    }

    function saveStorageArray(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function normalizeTitle(title) {
      return String(title || "").trim().toLowerCase();
    }

    function splitTags(value) {
      return String(value || "")
        .split(",")
        .map(v => v.trim().toLowerCase())
        .filter(Boolean);
    }

    function getFormItem(markWatched = false) {
      const title = document.getElementById("title").value.trim();
      const type = document.getElementById("typeInput").value;
      const runtime = Number(document.getElementById("runtime").value || 100);
      const genres = splitTags(document.getElementById("genres").value);
      const mood = splitTags(document.getElementById("moods").value);

      if (!title) {
        alert("Inserisci un titolo.");
        return null;
      }

      return {
        title,
        type,
        runtime,
        genres,
        mood,
        watched: markWatched
      };
    }

    function clearForm() {
      document.getElementById("title").value = "";
      document.getElementById("runtime").value = "";
      document.getElementById("genres").value = "";
      document.getElementById("moods").value = "";
      document.getElementById("typeInput").value = "film";
    }

    function addToWatchlist() {
      const item = getFormItem(false);
      if (!item) return;

      const watchlist = readStorageArray("watchlist");
      const watched = readStorageArray("watched");

      const allTitles = new Set([
        ...watchlist.map(x => normalizeTitle(x.title || x.name)),
        ...watched.map(x => normalizeTitle(x.title || x.name))
      ]);

      if (allTitles.has(normalizeTitle(item.title))) {
        alert("Questo titolo è già presente.");
        return;
      }

      watchlist.push(item);
      saveStorageArray("watchlist", watchlist);
      clearForm();
      renderAll();
    }

    function markDirectlyWatched() {
      const item = getFormItem(true);
      if (!item) return;

      const watchlist = readStorageArray("watchlist");
      const watched = readStorageArray("watched");

      const allTitles = new Set([
        ...watchlist.map(x => normalizeTitle(x.title || x.name)),
        ...watched.map(x => normalizeTitle(x.title || x.name))
      ]);

      if (allTitles.has(normalizeTitle(item.title))) {
        alert("Questo titolo è già presente.");
        return;
      }

      watched.push(item);
      saveStorageArray("watched", watched);
      clearForm();
      renderAll();
    }

    function markAsWatched(title) {
      const watchlist = readStorageArray("watchlist");
      const watched = readStorageArray("watched");

      const item = watchlist.find(x => normalizeTitle(x.title || x.name) === normalizeTitle(title));
      if (!item) return;

      const newWatchlist = watchlist.filter(
        x => normalizeTitle(x.title || x.name) !== normalizeTitle(title)
      );

      watched.push({ ...item, watched: true });

      saveStorageArray("watchlist", newWatchlist);
      saveStorageArray("watched", watched);
      renderAll();
    }

    function moveBackToWatchlist(title) {
      const watchlist = readStorageArray("watchlist");
      const watched = readStorageArray("watched");

      const item = watched.find(x => normalizeTitle(x.title || x.name) === normalizeTitle(title));
      if (!item) return;

      const newWatched = watched.filter(
        x => normalizeTitle(x.title || x.name) !== normalizeTitle(title)
      );

      watchlist.push({ ...item, watched: false });

      saveStorageArray("watchlist", watchlist);
      saveStorageArray("watched", newWatched);
      renderAll();
    }

    function deleteFromList(key, title) {
      const items = readStorageArray(key);
      const filtered = items.filter(
        x => normalizeTitle(x.title || x.name) !== normalizeTitle(title)
      );
      saveStorageArray(key, filtered);
      renderAll();
    }

    function itemMeta(item) {
      const t = item.type || "film";
      const r = item.runtime ? `${item.runtime} min` : "";
      const g = Array.isArray(item.genres) && item.genres.length ? item.genres.join(", ") : "nessun genere";
      const m = Array.isArray(item.mood) && item.mood.length ? item.mood.join(", ") : "nessun mood";
      return `${t} • ${r} • ${g} • ${m}`;
    }

    function renderWatchlist() {
      const box = document.getElementById("watchlist");
      const items = readStorageArray("watchlist");

      if (!items.length) {
        box.innerHTML = '<div class="item"><div class="item-info"><div class="item-title">Nessun titolo in watchlist</div><div class="item-meta">Aggiungi un film o una serie.</div></div></div>';
        return;
      }

      box.innerHTML = items.map(item => `
        <div class="item">
          <div class="item-info">
            <div class="item-title">${item.title}</div>
            <div class="item-meta">${itemMeta(item)}</div>
          </div>
          <div class="item-actions">
            <button class="small-btn btn-secondary" onclick="markAsWatched('${String(item.title).replace(/'/g, "\\'")}')">Visto</button>
            <button class="small-btn btn-danger" onclick="deleteFromList('watchlist','${String(item.title).replace(/'/g, "\\'")}')">Elimina</button>
          </div>
        </div>
      `).join("");
    }

    function renderWatched() {
      const box = document.getElementById("watchedList");
      const items = readStorageArray("watched");

      if (!items.length) {
        box.innerHTML = '<div class="item"><div class="item-info"><div class="item-title">Ancora nessun visto</div><div class="item-meta">Quando segni qualcosa come visto, apparirà qui.</div></div></div>';
        return;
      }

      box.innerHTML = items.map(item => `
        <div class="item">
          <div class="item-info">
            <div class="item-title">${item.title}</div>
            <div class="item-meta">${itemMeta(item)}</div>
          </div>
          <div class="item-actions">
            <button class="small-btn btn-primary" onclick="moveBackToWatchlist('${String(item.title).replace(/'/g, "\\'")}')">Riporta in watchlist</button>
            <button class="small-btn btn-danger" onclick="deleteFromList('watched','${String(item.title).replace(/'/g, "\\'")}')">Elimina</button>
          </div>
        </div>
      `).join("");
    }

    function renderAll() {
      renderWatchlist();
      renderWatched();
    }

    renderAll();
  </script>
</body>
</html>
